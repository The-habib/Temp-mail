openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: TempMail API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: mailbox
    description: Temp mailbox operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /providers:
    get:
      operationId: getProviders
      tags: [mailbox]
      summary: Get available email providers
      responses:
        "200":
          description: List of available providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Provider"

  /domains:
    get:
      operationId: getDomains
      tags: [mailbox]
      summary: Get available email domains
      responses:
        "200":
          description: List of available domains
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Domain"

  /mailbox:
    post:
      operationId: createMailbox
      tags: [mailbox]
      summary: Create a new temp mailbox
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MailboxInput"
      responses:
        "201":
          description: Created mailbox
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mailbox"
        "400":
          description: Bad request

  /mailbox/{id}/messages:
    get:
      operationId: getMessages
      tags: [mailbox]
      summary: Get messages for a mailbox
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MessageSummary"
        "404":
          description: Mailbox not found

  /mailbox/{id}/messages/{messageId}:
    get:
      operationId: getMessage
      tags: [mailbox]
      summary: Get a specific message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Message detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "404":
          description: Message not found
    delete:
      operationId: deleteMessage
      tags: [mailbox]
      summary: Delete a message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Provider:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        supportsCustom:
          type: boolean
      required:
        - id
        - name
        - description
        - supportsCustom

    Domain:
      type: object
      properties:
        id:
          type: string
        domain:
          type: string
        isActive:
          type: boolean
      required:
        - id
        - domain
        - isActive

    MailboxInput:
      type: object
      properties:
        address:
          type: string
          description: Full email address (username@domain)
        password:
          type: string
        provider:
          type: string
          description: Provider ID (mailtm, guerrillamail, templol)
      required:
        - address
        - password

    Mailbox:
      type: object
      properties:
        id:
          type: string
        address:
          type: string
        token:
          type: string
        createdAt:
          type: string
        provider:
          type: string
      required:
        - id
        - address
        - token
        - createdAt

    MessageSummary:
      type: object
      properties:
        id:
          type: string
        from:
          $ref: "#/components/schemas/EmailAddress"
        subject:
          type: string
        intro:
          type: string
        seen:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - from
        - subject
        - intro
        - seen
        - createdAt

    Message:
      type: object
      properties:
        id:
          type: string
        from:
          $ref: "#/components/schemas/EmailAddress"
        to:
          type: array
          items:
            $ref: "#/components/schemas/EmailAddress"
        subject:
          type: string
        intro:
          type: string
        text:
          type: ["string", "null"]
        html:
          type: ["string", "null"]
        seen:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - from
        - to
        - subject
        - intro
        - seen
        - createdAt

    EmailAddress:
      type: object
      properties:
        address:
          type: string
        name:
          type: string
      required:
        - address
        - name
